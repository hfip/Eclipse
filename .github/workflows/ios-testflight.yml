name: iOS TestFlight Upload

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "CFBundleVersion. Empty uses the GitHub run number."
        required: false
        default: ""
      upload:
        description: "Upload the exported IPA to App Store Connect."
        required: true
        type: boolean
        default: true

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    name: Archive, export, and upload iOS build
    runs-on: macos-latest
    timeout-minutes: 120

    env:
      APP_NAME: ${{ vars.IOS_APP_NAME || 'Eclipse' }}
      BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER || 'app.Eclipse.Soupy' }}
      DEVELOPMENT_TEAM: ${{ vars.IOS_DEVELOPMENT_TEAM || 'ANMK3Y568U' }}
      ICLOUD_CONTAINER_ID: ${{ vars.IOS_ICLOUD_CONTAINER_ID || 'iCloud.Eclipse.Soupy' }}
      PROJECT_PATH: Eclipse.xcodeproj
      SCHEME: Eclipse

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate signing secrets
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          for name in \
            APP_STORE_CONNECT_API_KEY_P8 \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_KEY_ID \
            IOS_DISTRIBUTION_CERTIFICATE_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is missing."
              exit 1
            fi
          done

      - name: Resolve build number
        env:
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail

          BUILD_NUMBER="${INPUT_BUILD_NUMBER:-${GITHUB_RUN_NUMBER}}"
          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Build number must be numeric. Received '$BUILD_NUMBER'."
            exit 1
          fi

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Create local build config
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
          MAL_CLIENT_SECRET: ${{ secrets.MAL_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          {
            printf 'APP_NAME = %s\n' "$APP_NAME"
            printf 'BUNDLE_IDENTIFIER = %s\n' "$BUNDLE_IDENTIFIER"
            printf 'DEVELOPMENT_TEAM = %s\n' "$DEVELOPMENT_TEAM"
            printf '%s\n' 'CODE_SIGN_ENTITLEMENTS = Eclipse/Eclipse.entitlements'
            printf 'ICLOUD_CONTAINER_ID = %s\n' "$ICLOUD_CONTAINER_ID"
            printf 'TMDB_API_KEY = %s\n' "${TMDB_API_KEY:-}"
            printf 'ANILIST_CLIENT_ID = %s\n' "${ANILIST_CLIENT_ID:-}"
            printf 'ANILIST_CLIENT_SECRET = %s\n' "${ANILIST_CLIENT_SECRET:-}"
            printf '%s\n' 'ANILIST_REDIRECT_URI = luna:/$()/anilist-callback'
            printf 'TRAKT_CLIENT_ID = %s\n' "${TRAKT_CLIENT_ID:-}"
            printf 'TRAKT_CLIENT_SECRET = %s\n' "${TRAKT_CLIENT_SECRET:-}"
            printf '%s\n' 'TRAKT_REDIRECT_URI = luna:/$()/trakt-callback'
            printf 'MAL_CLIENT_ID = %s\n' "${MAL_CLIENT_ID:-}"
            printf 'MAL_CLIENT_SECRET = %s\n' "${MAL_CLIENT_SECRET:-}"
            printf '%s\n' 'MAL_REDIRECT_URI = luna:/$()/mal-callback'
          } > Build.local.xcconfig

      - name: Install signing assets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/eclipse-signing.keychain-db"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$PROFILE_PLIST")
          EXPECTED_APP_ID="${DEVELOPMENT_TEAM}.${BUNDLE_IDENTIFIER}"

          if [ "$PROFILE_APP_ID" != "$EXPECTED_APP_ID" ]; then
            echo "::error::Provisioning profile app id '$PROFILE_APP_ID' does not match '$EXPECTED_APP_ID'."
            exit 1
          fi

          if [ -n "$ICLOUD_CONTAINER_ID" ]; then
            PROFILE_ICLOUD_CONTAINERS=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.icloud-container-identifiers" "$PROFILE_PLIST" 2>/dev/null || true)
            PROFILE_UBIQUITY_CONTAINERS=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.ubiquity-container-identifiers" "$PROFILE_PLIST" 2>/dev/null || true)
            if ! printf '%s\n%s\n' "$PROFILE_ICLOUD_CONTAINERS" "$PROFILE_UBIQUITY_CONTAINERS" | grep -Fq "$ICLOUD_CONTAINER_ID"; then
              echo "::error::Provisioning profile '$PROFILE_NAME' does not include iCloud container '$ICLOUD_CONTAINER_ID'. Eclipse uses modern iCloud Documents entitlements, so Xcode 5-compatible wildcard profiles such as '${DEVELOPMENT_TEAM}.*' are not sufficient. Use Include CloudKit support on the App ID, assign the container, regenerate the App Store/TestFlight profile, then update IOS_PROVISIONING_PROFILE_BASE64."
              exit 1
            fi
          fi

          PROFILE_INCREASED_MEMORY=$(/usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.developer.kernel.increased-memory-limit" "$PROFILE_PLIST" 2>/dev/null || true)
          if [ "$PROFILE_INCREASED_MEMORY" != "true" ]; then
            echo "::error::Provisioning profile '$PROFILE_NAME' does not include Increased Memory Limit. Enable the capability on the App ID, regenerate the profile, then update IOS_PROVISIONING_PROFILE_BASE64."
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          printf 'PROVISIONING_PROFILE_SPECIFIER = %s\n' "$PROFILE_NAME" >> Build.local.xcconfig

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/private_keys"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Resolve Swift packages
        run: |
          set -euo pipefail

          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Archive signed app
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          DERIVED_DATA_PATH="$RUNNER_TEMP/DerivedData"

          rm -rf "$ARCHIVE_PATH" "$DERIVED_DATA_PATH"

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            ECLIPSE_DISTRIBUTION_CHANNEL=TestFlight \
            ICLOUD_CONTAINER_ENVIRONMENT=Production \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export App Store IPA
        run: |
          set -euo pipefail

          EXPORT_DIR="$GITHUB_WORKSPACE/build/testflight"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          rm -rf "$EXPORT_DIR"
          mkdir -p "$EXPORT_DIR"

          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$DEVELOPMENT_TEAM</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_IDENTIFIER</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$EXPORT_DIR" \
            -skipPackagePluginValidation \
            -skipMacroValidation

          IPA_PATH="$(find "$EXPORT_DIR" -maxdepth 1 -type f -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA exported."
            find "$EXPORT_DIR" -maxdepth 2 -type f
            exit 1
          fi

          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload to App Store Connect
        if: ${{ inputs.upload }}
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          set -euo pipefail

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up signing keychain
        if: always()
        run: |
          set +e
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
