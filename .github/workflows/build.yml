name: Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Create local build config
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
          MAL_CLIENT_SECRET: ${{ secrets.MAL_CLIENT_SECRET }}
        run: |
          for name in TMDB_API_KEY ANILIST_CLIENT_ID ANILIST_CLIENT_SECRET TRAKT_CLIENT_ID TRAKT_CLIENT_SECRET MAL_CLIENT_ID MAL_CLIENT_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::warning::$name is not configured in GitHub Actions secrets; building with an empty value"
            fi
          done

          {
            printf 'TMDB_API_KEY = %s\n' "$TMDB_API_KEY"
            printf 'ANILIST_CLIENT_ID = %s\n' "$ANILIST_CLIENT_ID"
            printf 'ANILIST_CLIENT_SECRET = %s\n' "$ANILIST_CLIENT_SECRET"
            printf '%s\n' 'ANILIST_REDIRECT_URI = luna:/$()/anilist-callback'
            printf 'TRAKT_CLIENT_ID = %s\n' "$TRAKT_CLIENT_ID"
            printf 'TRAKT_CLIENT_SECRET = %s\n' "$TRAKT_CLIENT_SECRET"
            printf '%s\n' 'TRAKT_REDIRECT_URI = luna:/$()/trakt-callback'
            printf 'MAL_CLIENT_ID = %s\n' "$MAL_CLIENT_ID"
            printf 'MAL_CLIENT_SECRET = %s\n' "$MAL_CLIENT_SECRET"
            printf '%s\n' 'MAL_REDIRECT_URI = luna:/$()/mal-callback'
          } > Build.local.xcconfig
      - name: Make build script executable
        run: chmod +x ./ipabuild.sh
      - name: Use latest MPVKit (resolve eclipse-mpv-metal tip)
        run: |
          set -euo pipefail
          # MPVKit tracks the eclipse-mpv-metal branch and its 0.41.0 release is rebuilt IN PLACE,
          # so any non-tip Package.resolved pin carries a stale checksum and SPM resolution fails
          # with "downloaded artifact ... does not match checksum specified by the manifest".
          # Drop just the MPVKit pin so the xcodebuild resolve inside ipabuild.sh fetches the current
          # branch tip, whose Package.swift checksums match the freshly published binaries. Every
          # other dependency stays pinned (conservative resolution keeps satisfied pins untouched).
          RESOLVED="Eclipse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          if command -v jq >/dev/null 2>&1 && [ -f "$RESOLVED" ]; then
            tmp="$(mktemp)"
            jq 'del(.pins[] | select(.identity == "mpvkit")) | del(.originHash)' "$RESOLVED" > "$tmp"
            mv "$tmp" "$RESOLVED"
            echo "Dropped MPVKit pin; xcodebuild will resolve eclipse-mpv-metal branch tip."
          fi
      - name: Build iOS IPA
        run: ./ipabuild.sh ios
      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: Eclipse-iOS
          path: build/Eclipse.ipa
          if-no-files-found: error
