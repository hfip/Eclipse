name: iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Display name for this unsigned build. Empty uses IOS_APP_NAME repo variable, then Eclipse."
        required: false
        default: ""
      bundle_identifier:
        description: "Bundle ID for this unsigned build. Empty uses IOS_BUNDLE_IDENTIFIER repo variable, then app.Eclipse.Soupy."
        required: false
        default: ""

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve unsigned build settings
        env:
          INPUT_APP_NAME: ${{ inputs.app_name }}
          INPUT_BUNDLE_IDENTIFIER: ${{ inputs.bundle_identifier }}
          VARIABLE_APP_NAME: ${{ vars.IOS_APP_NAME }}
          VARIABLE_BUNDLE_IDENTIFIER: ${{ vars.IOS_BUNDLE_IDENTIFIER }}
          VARIABLE_DEVELOPMENT_TEAM: ${{ vars.IOS_DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail

          APP_NAME="${INPUT_APP_NAME:-${VARIABLE_APP_NAME:-Eclipse}}"
          BUNDLE_IDENTIFIER="${INPUT_BUNDLE_IDENTIFIER:-${VARIABLE_BUNDLE_IDENTIFIER:-app.Eclipse.Soupy}}"
          DEVELOPMENT_TEAM="${VARIABLE_DEVELOPMENT_TEAM:-ANMK3Y568U}"

          if ! [[ "$BUNDLE_IDENTIFIER" =~ ^[A-Za-z0-9][A-Za-z0-9-]*(\.[A-Za-z0-9][A-Za-z0-9-]*)+$ ]]; then
            echo "::error::Bundle identifier '$BUNDLE_IDENTIFIER' does not look valid. Example: com.yourname.eclipse"
            exit 1
          fi

          {
            echo "APP_NAME=$APP_NAME"
            echo "BUNDLE_IDENTIFIER=$BUNDLE_IDENTIFIER"
            echo "DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM"
          } >> "$GITHUB_ENV"

      - name: Create local build config
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
          MAL_CLIENT_SECRET: ${{ secrets.MAL_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          for name in TMDB_API_KEY ANILIST_CLIENT_ID ANILIST_CLIENT_SECRET TRAKT_CLIENT_ID TRAKT_CLIENT_SECRET MAL_CLIENT_ID MAL_CLIENT_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::warning::$name is not configured in GitHub Actions secrets; building with an empty value"
            fi
          done

          {
            printf 'APP_NAME = %s\n' "$APP_NAME"
            printf 'BUNDLE_IDENTIFIER = %s\n' "$BUNDLE_IDENTIFIER"
            printf 'DEVELOPMENT_TEAM = %s\n' "$DEVELOPMENT_TEAM"
            printf '%s\n' 'CODE_SIGN_ENTITLEMENTS ='
            printf '%s\n' 'ICLOUD_CONTAINER_ID ='
            printf 'TMDB_API_KEY = %s\n' "${TMDB_API_KEY:-}"
            printf 'ANILIST_CLIENT_ID = %s\n' "${ANILIST_CLIENT_ID:-}"
            printf 'ANILIST_CLIENT_SECRET = %s\n' "${ANILIST_CLIENT_SECRET:-}"
            printf '%s\n' 'ANILIST_REDIRECT_URI = luna:/$()/anilist-callback'
            printf 'TRAKT_CLIENT_ID = %s\n' "${TRAKT_CLIENT_ID:-}"
            printf 'TRAKT_CLIENT_SECRET = %s\n' "${TRAKT_CLIENT_SECRET:-}"
            printf '%s\n' 'TRAKT_REDIRECT_URI = luna:/$()/trakt-callback'
            printf 'MAL_CLIENT_ID = %s\n' "${MAL_CLIENT_ID:-}"
            printf 'MAL_CLIENT_SECRET = %s\n' "${MAL_CLIENT_SECRET:-}"
            printf '%s\n' 'MAL_REDIRECT_URI = luna:/$()/mal-callback'
          } > Build.local.xcconfig

      - name: Resolve Swift packages
        run: |
          set -euo pipefail

          xcodebuild -resolvePackageDependencies \
            -project Eclipse.xcodeproj \
            -scheme Eclipse \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Build unsigned archive
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          DERIVED_DATA_PATH="$RUNNER_TEMP/DerivedData"

          rm -rf "$ARCHIVE_PATH" "$DERIVED_DATA_PATH"

          xcodebuild archive \
            -project Eclipse.xcodeproj \
            -scheme Eclipse \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          PACKAGE_ROOT="$RUNNER_TEMP/unsigned-ipa"
          OUTPUT_DIR="$GITHUB_WORKSPACE/build"
          SAFE_APP_NAME="$(printf '%s' "$APP_NAME" | sed 's/[^A-Za-z0-9._+-]/-/g')"
          IPA_PATH="$OUTPUT_DIR/$SAFE_APP_NAME-unsigned.ipa"

          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::No .app bundle found in archive."
            find "$ARCHIVE_PATH" -type d -name '*.app' 2>/dev/null || true
            exit 1
          fi

          rm -rf "$PACKAGE_ROOT" "$OUTPUT_DIR"
          mkdir -p "$PACKAGE_ROOT/Payload" "$OUTPUT_DIR"
          cp -R "$APP_PATH" "$PACKAGE_ROOT/Payload/$APP_NAME.app"

          rm -rf "$PACKAGE_ROOT/Payload/$APP_NAME.app/_CodeSignature"
          rm -f "$PACKAGE_ROOT/Payload/$APP_NAME.app/embedded.mobileprovision"

          if [ -f "$PACKAGE_ROOT/Payload/$APP_NAME.app/Eclipse" ]; then
            strip "$PACKAGE_ROOT/Payload/$APP_NAME.app/Eclipse" 2>/dev/null || true
          fi

          (
            cd "$PACKAGE_ROOT"
            zip -qry "$IPA_PATH" Payload
          )

          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: Eclipse-iOS-unsigned-${{ github.run_number }}
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error
