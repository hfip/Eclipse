name: Privacy Policy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - privacy-policy.md
      - .github/workflows/privacy-policy-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: privacy-policy-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build privacy policy site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static privacy policy
        shell: python
        run: |
          from html import escape
          from pathlib import Path
          import re

          source = Path("privacy-policy.md")
          if not source.exists():
              raise SystemExit("privacy-policy.md is missing")

          lines = source.read_text(encoding="utf-8").splitlines()
          body = []
          in_list = False

          def close_list():
              global in_list
              if in_list:
                  body.append("</ul>")
                  in_list = False

          for raw in lines:
              line = raw.rstrip()
              if not line:
                  close_list()
                  continue

              if line.startswith("# "):
                  close_list()
                  body.append(f"<h1>{escape(line[2:].strip())}</h1>")
              elif line.startswith("## "):
                  close_list()
                  body.append(f"<h2>{escape(line[3:].strip())}</h2>")
              elif line.startswith("- "):
                  if not in_list:
                      body.append("<ul>")
                      in_list = True
                  body.append(f"<li>{escape(line[2:].strip())}</li>")
              else:
                  close_list()
                  text = escape(line)
                  text = re.sub(r"(https://[^\s<]+)", r'<a href="\1">\1</a>', text)
                  body.append(f"<p>{text}</p>")

          close_list()

          html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Eclipse Privacy Policy</title>
            <style>
              :root {{
                color-scheme: light dark;
                --bg: #0b0714;
                --panel: rgba(255,255,255,.075);
                --text: #f8f6ff;
                --muted: #c9c1d8;
                --accent: #ff6b6b;
                --border: rgba(255,255,255,.13);
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0;
                min-height: 100vh;
                background:
                  radial-gradient(circle at top left, rgba(104, 58, 183, .32), transparent 32rem),
                  linear-gradient(180deg, #141025 0%, var(--bg) 100%);
                color: var(--text);
                font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              }}
              main {{
                width: min(860px, calc(100% - 32px));
                margin: 0 auto;
                padding: 56px 0;
              }}
              article {{
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 22px;
                padding: clamp(24px, 5vw, 56px);
                backdrop-filter: blur(18px);
              }}
              h1 {{
                margin: 0 0 18px;
                font-size: clamp(2.1rem, 7vw, 4.8rem);
                line-height: 1;
                letter-spacing: 0;
              }}
              h2 {{
                margin: 38px 0 10px;
                font-size: clamp(1.25rem, 4vw, 2rem);
                line-height: 1.2;
                letter-spacing: 0;
              }}
              p, li {{ color: var(--muted); }}
              ul {{ padding-left: 1.3rem; }}
              a {{
                color: var(--accent);
                overflow-wrap: anywhere;
              }}
            </style>
          </head>
          <body>
            <main>
              <article>
                {"".join(body)}
              </article>
            </main>
          </body>
          </html>
          """

          site = Path("_site/privacy-policy")
          site.mkdir(parents=True, exist_ok=True)
          (site / "index.html").write_text(html, encoding="utf-8")
          Path("_site/index.html").write_text(
              '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=privacy-policy/"><link rel="canonical" href="privacy-policy/">',
              encoding="utf-8",
          )

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy privacy policy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}privacy-policy/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
