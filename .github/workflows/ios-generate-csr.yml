name: iOS Generate Certificate Signing Request

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-csr:
    name: Generate Apple Distribution CSR
    runs-on: macos-latest
    steps:
      - name: Validate encryption password
        shell: bash
        env:
          CSR_ARTIFACT_PASSWORD: ${{ secrets.IOS_CSR_ARTIFACT_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${CSR_ARTIFACT_PASSWORD}" ]]; then
            echo "Missing IOS_CSR_ARTIFACT_PASSWORD secret." >&2
            exit 1
          fi

      - name: Generate CSR and private key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/csr build/private

          openssl genrsa -out build/private/eclipse-ios-distribution-private-key.pem 2048
          openssl req \
            -new \
            -key build/private/eclipse-ios-distribution-private-key.pem \
            -out build/csr/eclipse-ios-distribution.csr \
            -subj "/CN=Eclipse Apple Distribution/O=Soupy-dev/C=US"

          openssl req \
            -in build/csr/eclipse-ios-distribution.csr \
            -noout \
            -subject \
            -nameopt RFC2253 \
            > build/csr/csr-subject.txt

          openssl rsa \
            -in build/private/eclipse-ios-distribution-private-key.pem \
            -pubout \
            -outform pem \
            | openssl sha256 \
            > build/csr/private-key-public-fingerprint.txt

          cat > build/csr/README.txt <<'EOF'
          Upload eclipse-ios-distribution.csr to Apple Developer:
          Certificates, Identifiers & Profiles > Certificates > + > Apple Distribution.

          After Apple gives you the .cer file, keep it with the encrypted private key artifact from this same workflow run.
          The certificate and private key must match.
          EOF

      - name: Encrypt private key
        shell: bash
        env:
          CSR_ARTIFACT_PASSWORD: ${{ secrets.IOS_CSR_ARTIFACT_PASSWORD }}
        run: |
          set -euo pipefail
          tar -C build/private -czf build/eclipse-ios-distribution-private-key.tar.gz eclipse-ios-distribution-private-key.pem
          openssl enc \
            -aes-256-cbc \
            -salt \
            -pbkdf2 \
            -pass env:CSR_ARTIFACT_PASSWORD \
            -in build/eclipse-ios-distribution-private-key.tar.gz \
            -out build/eclipse-ios-distribution-private-key.tar.gz.enc

      - name: Upload CSR artifact
        uses: actions/upload-artifact@v6
        with:
          name: eclipse-ios-csr
          path: build/csr
          if-no-files-found: error
          retention-days: 30

      - name: Upload encrypted private key artifact
        uses: actions/upload-artifact@v6
        with:
          name: eclipse-ios-encrypted-private-key
          path: build/eclipse-ios-distribution-private-key.tar.gz.enc
          if-no-files-found: error
          retention-days: 30
